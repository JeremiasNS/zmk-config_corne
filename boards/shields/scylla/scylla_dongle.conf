# ── Display ───────────────────────────────────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Usa tela customizada do zmk-dongle-display
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# ── zmk-dongle-display — widgets ──────────────────────────────────────────────
# WPM
CONFIG_ZMK_DONGLE_DISPLAY_WPM=y
CONFIG_ZMK_WPM=y

# Bongo cat animado (digita junto com o WPM)
CONFIG_ZMK_DONGLE_DISPLAY_BONGO_CAT=y

# Bateria do dongle na tela
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y

# Indicadores HID (CapsLock, NumLock, ScrollLock)
CONFIG_ZMK_HID_INDICATORS=y

# Símbolos de modificadores no estilo Windows
CONFIG_ZMK_DONGLE_DISPLAY_MAC_MODIFIERS=n

# Nome do layer — alinhamento e largura antes de rolar
CONFIG_ZMK_DONGLE_DISPLAY_LAYER_TEXT_ALIGN="left"
CONFIG_ZMK_DONGLE_DISPLAY_LAYER_NAME_SCROLL_WIDTH=50

# ── LVGL — display monocromático 1-bit ────────────────────────────────────────
CONFIG_LV_Z_VDB_SIZE=64
CONFIG_LV_DPI_DEF=148
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_COLOR_DEPTH_1=y

# ── Dongle — sem sleep (conectado via USB) ────────────────────────────────────
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_EXT_POWER=n


CONFIG_PINCTRL=y
CONFIG_SPI=y
CONFIG_INPUT=y

#EXT POWER
CONFIG_ZMK_EXT_POWER=y

#BLE-passkey
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n

#BLE-clean
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=n

#CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_POINTING=y

# 3 profiles (n+2)
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6

# dongle mode
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# display
CONFIG_BT_BAS=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y