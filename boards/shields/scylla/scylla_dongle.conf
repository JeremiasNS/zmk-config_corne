# ── Display ──────────────────────────────────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_DISPLAY=y

# Usa tela customizada do zmk-nice-oled
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Fila dedicada para o display
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Sem sleep no dongle (conectado via USB)
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_EXT_POWER=n

# ── zmk-nice-oled ─────────────────────────────────────────────────────────────
# Canvas ajustado para display horizontal 128×64
CONFIG_NICE_OLED_CUSTOM_CANVAS_WIDTH=128
CONFIG_NICE_OLED_CUSTOM_CANVAS_HEIGHT=64

# LVGL — configurações para display monocromático 1-bit
CONFIG_LV_Z_VDB_SIZE=64
CONFIG_LV_DPI_DEF=148
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_MEM_POOL_SIZE=8192

# ── Widgets ativos ────────────────────────────────────────────────────────────
# Layer atual
CONFIG_NICE_OLED_WIDGET_LAYER=y

# WPM — velocidade de digitação
CONFIG_NICE_OLED_WIDGET_WPM=y
CONFIG_ZMK_WPM=y
CONFIG_NICE_OLED_WIDGET_WPM_NUMBER=y
CONFIG_NICE_OLED_WIDGET_WPM_SPEEDOMETER=y
# Desativa Luna para economizar RAM (pode ativar depois)
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=n

# Indicadores de teclas modificadoras (Ctrl, Shift, Alt, GUI)
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_WINDOWS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_MACOS=n

# HID indicators (CapsLock etc.)
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=y
CONFIG_ZMK_HID_INDICATORS=y

# ── Hora via RAW HID (requer zmk-hid-host no PC) ─────────────────────────────
# Descomente para ativar hora e volume na tela
# CONFIG_NICE_OLED_WIDGET_RAW_HID=y
# CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME=y
# CONFIG_NICE_OLED_WIDGET_RAW_HID_VOLUME=y

# ── Periférico — sem animação (economiza bateria) ─────────────────────────────
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=n
CONFIG_NICE_OLED_WIDGET_STATIC_IMAGE_PERIPHERAL=y

#CONFIG_NICE_OLED_WIDGET_STATIC_IMAGE_PERIPHERAL_VIM=y